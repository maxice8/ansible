---
- name: Create unified configuration directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - /etc/forgejo
    - /etc/containers/systemd

- name: Copy Tailscale serve.json to unified location
  ansible.builtin.copy:
    src: tailscale_serve.json
    dest: /etc/forgejo/serve.json
    owner: root
    group: root
    mode: "0644"
  notify: Restart Tailscale

- name: Deploy Forgejo Quadlets
  ansible.builtin.template:
    owner: root
    group: root
    mode: "0644"
    dest: "/etc/containers/systemd/{{ item | regex_replace('\\.j2$', '') }}"
    src: "{{ item }}"
  loop:
    - ts-forgejo-data.volume
    - forgejo-data.volume
    - ts-forgejo.container.j2
    - forgejo.container.j2
  notify: Reload systemd and Restart Forgejo

- name: Ensure Forgejo service is started
  ansible.builtin.systemd:
    daemon_reload: true
    name: forgejo.service
    state: started
