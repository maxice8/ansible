---
- name: Create unified configuration directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - /etc/forgejo
    - /etc/containers/systemd

- name: Deploy Tailscale Sidecar Quadlets
  ansible.builtin.template:
    owner: root
    group: root
    mode: "0644"
    dest: "/etc/containers/systemd/{{ item | regex_replace('\\.j2$', '') }}"
    src: "{{ item }}"
  loop:
    - ts-forgejo-data.volume
    - ts-forgejo.container.j2
  notify:
    - Reload systemd
    - Restart Tailscale

- name: Deploy Forgejo Server Quadlets
  ansible.builtin.template:
    owner: root
    group: root
    mode: "0644"
    dest: "/etc/containers/systemd/{{ item | regex_replace('\\.j2$', '') }}"
    src: "{{ item }}"
  loop:
    - forgejo-data.volume
    - forgejo.container.j2
  notify:
    - Reload systemd
    - Restart Forgejo

- name: Ensure Forgejo service is started
  ansible.builtin.systemd:
    daemon_reload: true
    name: forgejo.service
    state: started
