---
- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: Apply forgejo sysusers
  ansible.builtin.command: systemd-sysusers /etc/sysusers.d/forgejo.conf
  changed_when: true

- name: Apply forgejo tmpfiles
  ansible.builtin.command: systemd-tmpfiles --create /etc/tmpfiles.d/forgejo.conf
  changed_when: true

- name: Restart Tailscale
  ansible.builtin.systemd:
    name: ts-forgejo.service
    state: restarted

- name: Restart Forgejo
  ansible.builtin.systemd:
    name: forgejo.service
    state: restarted
