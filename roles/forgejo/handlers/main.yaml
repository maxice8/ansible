---
- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: Apply sysusers
  ansible.builtin.command: systemd-sysusers
  changed_when: true

- name: Restart Tailscale
  ansible.builtin.systemd:
    name: ts-forgejo.service
    state: restarted

- name: Restart Forgejo
  ansible.builtin.systemd:
    name: forgejo.service
    state: restarted
