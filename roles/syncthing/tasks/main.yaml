---
- name: Ensure sysusers.d directory exists
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - /etc/sysusers.d
    - /etc/tmpfiles.d

- name: Declaratively create Syncthing system user
  ansible.builtin.copy:
    dest: /etc/sysusers.d/syncthing.conf
    mode: "0644"
    content: |
      # Type Name       ID             GECOS                 Home directory Shell
      u      syncthing  -              "Syncthing Daemon"    /var/syncthing -
  notify: Apply syncthing sysusers

- name: Configure Syncthing tmpfiles
  ansible.builtin.copy:
    dest: /etc/tmpfiles.d/syncthing.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      d /etc/syncthing 0755 root root -
  notify: Apply syncthing tmpfiles

# Force Ansible to run the notified handler IMMEDIATELY
- name: Flush handlers to create user before fetching
  ansible.builtin.meta: flush_handlers

- name: Fetch newly created Syncthing user info
  ansible.builtin.getent:
    database: passwd
    key: syncthing

- name: Copy Tailscale serve.json
  ansible.builtin.copy:
    src: tailscale_serve.json
    dest: /etc/syncthing/serve.json
    owner: root
    group: root
    mode: "0644"
  notify: Restart Tailscale

- name: Ensure Quadlet directory exists
  ansible.builtin.file:
    path: /etc/containers/systemd
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy Tailscale Sidecar Quadlets
  ansible.builtin.template:
    owner: root
    group: root
    mode: "0644"
    dest: "/etc/containers/systemd/{{ item | regex_replace('\\.j2$', '') }}"
    src: "{{ item }}"
  loop:
    - ts-syncthing-data.volume
    - ts-syncthing.container.j2
  notify:
    - Reload systemd
    - Restart Tailscale

- name: Store Syncthing Tailscale Auth-Key as a Podman Secret
  containers.podman.podman_secret:
    name: ts_syncthing_key
    state: present
    data: "{{ syncthing_tskey }}"
    force: true

- name: Deploy Syncthing Quadlets
  ansible.builtin.template:
    owner: root
    group: root
    mode: "0644"
    dest: "/etc/containers/systemd/{{ item | regex_replace('\\.j2$', '') }}"
    src: "{{ item }}"
  vars:
    # Inject the dynamically assigned system IDs into the template
    syncthing_user_id: "{{ ansible_facts.getent_passwd['syncthing'][1] }}"
    syncthing_user_group_id: "{{ ansible_facts.getent_passwd['syncthing'][2] }}"
  loop:
    - syncthing-data.volume
    - syncthing.container.j2
  notify:
    - Reload systemd
    - Restart Syncthing

- name: Ensure Syncthing service is started
  ansible.builtin.systemd:
    daemon_reload: true
    name: syncthing.service
    state: started

- name: Deploy Syncthing Heartbeat Service and Timer
  when: (heartbeat_syncthing | default('')) != ""
  block:
    - name: Create Syncthing Heartbeat Service
      ansible.builtin.copy:
        dest: /etc/systemd/system/syncthing-heartbeat.service
        mode: "0644"
        content: |
          [Unit]
          Description=Syncthing Heartbeat

          [Service]
          Type=oneshot
          ExecStart=/bin/sh -c \
            'podman inspect --format "{% raw %}{{ .State.Health.Status }}{% endraw %}" syncthing | \
            grep -q healthy && \
            curl -fsS -m 5 --retry 3 {{ heartbeat_syncthing }} > /dev/null'

    - name: Create Syncthing Heartbeat Timer
      ansible.builtin.copy:
        dest: /etc/systemd/system/syncthing-heartbeat.timer
        mode: "0644"
        content: |
          [Unit]
          Description=Syncthing Heartbeat Timer

          [Timer]
          OnCalendar=*:0/5
          Persistent=true

          [Install]
          WantedBy=timers.target

    - name: Enable and start Syncthing Heartbeat Timer
      ansible.builtin.systemd:
        name: syncthing-heartbeat.timer
        enabled: true
        state: started
        daemon_reload: true
