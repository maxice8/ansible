---
- name: Ensure sysusers.d directory exists
  ansible.builtin.file:
    path: /etc/sysusers.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Declaratively create Syncthing system user
  ansible.builtin.copy:
    dest: /etc/sysusers.d/syncthing.conf
    mode: "0644"
    content: |
      # Type Name       ID             GECOS                 Home directory Shell
      u      syncthing  -              "Syncthing Daemon"    /var/syncthing -
  notify: Apply sysusers

# Force Ansible to run the notified handler IMMEDIATELY
- name: Flush handlers to create user before fetching
  ansible.builtin.meta: flush_handlers

- name: Fetch newly created Syncthing user info
  ansible.builtin.getent:
    database: passwd
    key: syncthing

- name: Create working directories for syncthing
  ansible.builtin.file:
    owner: root
    group: root
    mode: "0755"
    state: directory
    path: "{{ item }}"
  loop:
    - /etc/syncthing
    - /etc/containers/systemd

- name: Copy Tailscale serve.json
  ansible.builtin.copy:
    src: tailscale_serve.json
    dest: /etc/syncthing/serve.json
    owner: root
    group: root
    mode: "0644"
  notify: Restart Tailscale

- name: Deploy Tailscale Sidecar Quadlets
  ansible.builtin.template:
    owner: root
    group: root
    mode: "0644"
    dest: "/etc/containers/systemd/{{ item | regex_replace('\\.j2$', '') }}"
    src: "{{ item }}"
  loop:
    - ts-syncthing-data.volume
    - ts-syncthing.container.j2
  notify:
    - Reload systemd
    - Restart Tailscale

- name: Store Syncthing Tailscale Auth-Key as a Podman Secret
  containers.podman.podman_secret:
    name: ts_syncthing_key
    state: present
    data: "{{ syncthing_tskey }}?ephemeral=false"
    force: true

- name: Deploy Syncthing Quadlets
  ansible.builtin.template:
    owner: root
    group: root
    mode: "0644"
    dest: "/etc/containers/systemd/{{ item | regex_replace('\\.j2$', '') }}"
    src: "{{ item }}"
  vars:
    # Inject the dynamically assigned system IDs into the template
    syncthing_user_id: "{{ ansible_facts.getent_passwd['syncthing'][1] }}"
    syncthing_user_group_id: "{{ ansible_facts.getent_passwd['syncthing'][2] }}"
  loop:
    - syncthing-data.volume
    - syncthing.container.j2
  notify:
    - Reload systemd
    - Restart Syncthing

- name: Ensure Syncthing service is started
  ansible.builtin.systemd:
    daemon_reload: true
    name: syncthing.service
    state: started

- name: Setup Heartbeat Cron for Syncthing
  ansible.builtin.cron:
    name: "Syncthing Heartbeat"
    # Replaced docker with podman
    job: >
      podman inspect --format '{{ '{{' }}.State.Health.Status{{ '}}' }}' syncthing
      | grep -q healthy && curl -fsS -m 5 --retry 3 {{ heartbeat_syncthing }} > /dev/null
    minute: "*/5"
  when: (heartbeat_syncthing | default('')) != ""
