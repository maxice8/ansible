---
- name: Get the PUID for the user
  ansible.builtin.command: id -u {{ syncthing_username }}
  register: syncthing_puid
  check_mode: false
  changed_when: false

- name: Get the PGID for the user
  ansible.builtin.command: id -g {{ syncthing_username }}
  register: syncthing_pgid
  check_mode: false
  changed_when: false

- name: Create working directories for syncthing
  ansible.builtin.file:
    owner: root
    group: root
    mode: "0755"
    state: directory
    path: "{{ item }}"
  loop:
    - /etc/syncthing
    - /etc/containers/systemd

- name: Copy Tailscale serve.json
  ansible.builtin.copy:
    src: tailscale_serve.json
    dest: /etc/syncthing/serve.json
    owner: root
    group: root
    mode: "0644"
  notify: Restart Tailscale

- name: Deploy Tailscale Sidecar Quadlets
  ansible.builtin.template:
    owner: root
    group: root
    mode: "0644"
    dest: "/etc/containers/systemd/{{ item | regex_replace('\\.j2$', '') }}"
    src: "{{ item }}"
  loop:
    - ts-syncthing-data.volume
    - ts-syncthing.container.j2
  notify:
    - Reload systemd
    - Restart Tailscale

- name: Deploy Syncthing Quadlets
  ansible.builtin.template:
    owner: root
    group: root
    mode: "0644"
    dest: "/etc/containers/systemd/{{ item | regex_replace('\\.j2$', '') }}"
    src: "{{ item }}"
  vars:
    syncthing_user_id: "{{ syncthing_puid.stdout }}"
    syncthing_user_group_id: "{{ syncthing_pgid.stdout }}"
  loop:
    - syncthing-data.volume
    - syncthing.container.j2
  notify:
    - Reload systemd
    - Restart Syncthing


- name: Ensure Syncthing service is started
  ansible.builtin.systemd:
    daemon_reload: true
    name: syncthing.service
    state: started

- name: Setup Heartbeat Cron for Syncthing
  ansible.builtin.cron:
    name: "Syncthing Heartbeat"
    # Replaced docker with podman
    job: >
      podman inspect --format '{{ '{{' }}.State.Health.Status{{ '}}' }}' syncthing
      | grep -q healthy && curl -fsS -m 5 --retry 3 {{ heartbeat_syncthing }} > /dev/null
    minute: "*/5"
  when: (heartbeat_syncthing | default('')) != ""
