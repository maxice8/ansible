---
- name: Reload systemd and Restart Syncthing
  ansible.builtin.systemd:
    daemon_reload: true
    name: syncthing.service
    state: restarted

- name: Restart Tailscale
  ansible.builtin.systemd:
    daemon_reload: true
    name: ts-syncthing.service
    state: restarted

- name: Restart Syncthing
  ansible.builtin.systemd:
    daemon_reload: true
    name: syncthing.service
    state: restarted
