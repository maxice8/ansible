---
# ansible/roles/asf/tasks/main.yaml
- name: Create docker-compose directory for ASF
  ansible.builtin.file:
    owner: root
    group: root
    mode: "0755"
    state: directory
    path: /srv/asf

- name: Create config directory for ASF
  ansible.builtin.file:
    owner: "1000"
    group: "1000"
    mode: "0700"
    state: directory
    path: /srv/asf/config

- name: Template ASF.json to /srv/asf/config
  ansible.builtin.template:
    src: ASF.json.j2
    dest: /srv/asf/config/ASF.json
    owner: "1000"
    group: "1000"
    mode: "0600"
    force: false # Ensures we don't overwrite settings if you edit them via the Web UI later
  notify: Restart ASF

- name: Copy docker-compose files to /srv/asf
  ansible.builtin.template:
    owner: root
    group: root
    mode: "0644"
    dest: /srv/asf/docker-compose.yml
    src: docker-compose.yml.j2
  notify: Restart ASF

- name: Enable ASF docker
  community.docker.docker_compose_v2:
    project_src: /srv/asf
    wait: true
    wait_timeout: 90
    build: never
