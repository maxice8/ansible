- name: Create working directories for ASF
  ansible.builtin.file:
    owner: root
    group: root
    mode: "0755"
    state: directory
    path: "{{ item }}"
  loop:
    - /srv/asf
    - /etc/containers/systemd

- name: Create config directory for ASF
  ansible.builtin.file:
    owner: "1000"
    group: "1000"
    mode: "0700"
    state: directory
    path: /srv/asf/config

- name: Template ASF.json to /srv/asf/config
  ansible.builtin.template:
    src: ASF.json.j2
    dest: /srv/asf/config/ASF.json
    owner: "1000"
    group: "1000"
    mode: "0600"
    force: false
  notify: Restart ASF

- name: Copy Tailscale serve.json
  ansible.builtin.copy:
    src: tailscale_serve.json
    dest: /srv/asf/tailscale_serve.json
    owner: root
    group: root
    mode: "0644"
  notify: Restart Tailscale

- name: Deploy Podman Quadlets
  ansible.builtin.template:
    src: "{{ item }}"
    dest: "/etc/containers/systemd/{{ item | regex_replace('\\.j2$', '') }}"
    owner: root
    group: root
    mode: "0644"
  loop:
    - ts-asf-data.volume
    - ts-asf.container.j2
    - asf.container
  notify: Reload systemd and Restart ASF

- name: Ensure Quadlet services are enabled and started
  ansible.builtin.systemd:
    daemon_reload: true
    name: asf.service
    state: started
    enabled: true
