---
- name: Create directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner | default('root') }}"
    group: "{{ item.group | default('root') }}"
    mode: "{{ item.mode | default('0755') }}"
  loop:
    - { path: /srv/forgejo-runner/data, owner: 1000, group: 1000 }
    - { path: /etc/containers/systemd }

- name: Template /srv/forgejo-runner/data/config.yml
  ansible.builtin.template:
    src: config.yaml.j2
    dest: /srv/forgejo-runner/data/config.yml
    owner: 1000
    group: 1000
    mode: "0644"
  notify: Restart Forgejo Runner

- name: Template /srv/forgejo-runner/data/entrypoint.sh
  ansible.builtin.template:
    src: entrypoint.sh.j2
    dest: /srv/forgejo-runner/data/entrypoint.sh
    owner: 1000
    group: 1000
    mode: "0755"
  notify: Restart Forgejo Runner

- name: Deploy Forgejo Runner Quadlets
  ansible.builtin.template:
    owner: root
    group: root
    mode: "0644"
    dest: "/etc/containers/systemd/{{ item | regex_replace('\\.j2$', '') }}"
    src: "{{ item }}"
  loop:
    - ts-forgejo-runner-data.volume
    - dind-data.volume
    - ts-forgejo-runner.container.j2
    - dind.container.j2
    - runner.container.j2
  notify: Reload systemd and Restart Runner

- name: Ensure Forgejo Runner service is started
  ansible.builtin.systemd:
    daemon_reload: true
    name: runner.service
    state: started
