---
- name: Create unified configuration directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - /etc/forgejo-runner
    - /etc/containers/systemd

- name: Template runner configuration to centralized location
  ansible.builtin.template:
    src: config.yaml.j2
    dest: /etc/forgejo-runner/config.yml
    owner: "1000"
    group: "1000"
    mode: "0644"
  notify: Restart Forgejo Runner

- name: Template entrypoint script to centralized location
  ansible.builtin.template:
    src: entrypoint.sh.j2
    dest: /etc/forgejo-runner/entrypoint.sh
    owner: "1000"
    group: "1000"
    mode: "0755"
  notify: Restart Forgejo Runner

- name: Ensure Tailscale serve.json exists (even if empty)
  ansible.builtin.copy:
    dest: /etc/forgejo-runner/serve.json
    content: "{}"
    owner: root
    group: root
    mode: "0644"

- name: Deploy Tailscale Sidecar Quadlets
  ansible.builtin.template:
    owner: root
    group: root
    mode: "0644"
    dest: "/etc/containers/systemd/{{ item | regex_replace('\\.j2$', '') }}"
    src: "{{ item }}"
  loop:
    - ts-forgejo-runner-data.volume
    - ts-forgejo-runner.container.j2
  notify:
    - Reload systemd
    - Restart Tailscale

- name: Deploy Docker-in-Docker Quadlets
  ansible.builtin.template:
    owner: root
    group: root
    mode: "0644"
    dest: "/etc/containers/systemd/{{ item | regex_replace('\\.j2$', '') }}"
    src: "{{ item }}"
  loop:
    - dind-data.volume
    - dind.container.j2
  notify:
    - Reload systemd
    - Restart DinD

- name: Deploy Forgejo Runner Quadlets
  ansible.builtin.template:
    owner: root
    group: root
    mode: "0644"
    dest: "/etc/containers/systemd/{{ item | regex_replace('\\.j2$', '') }}"
    src: "{{ item }}"
  loop:
    - forgejo-runner-data.volume
    - runner.container.j2
  notify:
    - Reload systemd
    - Restart Forgejo Runner

- name: Ensure Forgejo Runner service is started
  ansible.builtin.systemd:
    daemon_reload: true
    name: runner.service
    state: started
