---
- name: Ensure sysusers.d directory exists
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - /etc/sysusers.d
    - /etc/tmpfiles.d

- name: Declaratively create Forgejo Runner system user
  ansible.builtin.copy:
    dest: /etc/sysusers.d/forgejo-runner.conf
    mode: "0644"
    content: |
      # Type Name            ID   GECOS                   Home directory Shell
      u      forgejo-runner  -    "Forgejo Runner Daemon" /data          -
  register: forgejo_runner_sysusers_config

- name: Apply forgejo-runner sysusers immediately # noqa: no-handler
  ansible.builtin.command: systemd-sysusers /etc/sysusers.d/forgejo-runner.conf
  changed_when: true
  when: forgejo_runner_sysusers_config.changed

- name: Configure Forgejo Runner tmpfiles
  ansible.builtin.copy:
    dest: /etc/tmpfiles.d/forgejo-runner.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      d /etc/forgejo-runner 0755 root root -
  register: forgejo_runner_tmpfiles_config

- name: Apply forgejo-runner tmpfiles immediately # noqa: no-handler
  ansible.builtin.command: systemd-tmpfiles --create /etc/tmpfiles.d/forgejo-runner.conf
  changed_when: true
  when: forgejo_runner_tmpfiles_config.changed

- name: Fetch newly created Forgejo Runner user info
  ansible.builtin.getent:
    database: passwd
    key: forgejo-runner

- name: Template runner configuration to centralized location
  ansible.builtin.template:
    src: config.yaml.j2
    dest: /etc/forgejo-runner/config.yml
    # Use dynamic IDs
    owner: "{{ ansible_facts.getent_passwd['forgejo-runner'][1] }}"
    group: "{{ ansible_facts.getent_passwd['forgejo-runner'][2] }}"
    mode: "0644"
  notify: Restart Forgejo Runner

- name: Template entrypoint script to centralized location
  ansible.builtin.template:
    src: entrypoint.sh.j2
    dest: /etc/forgejo-runner/entrypoint.sh
    # Use dynamic IDs
    owner: "{{ ansible_facts.getent_passwd['forgejo-runner'][1] }}"
    group: "{{ ansible_facts.getent_passwd['forgejo-runner'][2] }}"
    mode: "0755"
  notify: Restart Forgejo Runner

- name: Store runner token as a podman secret
  containers.podman.podman_secret:
    name: forgejo_runner_token
    state: present
    data: "{{ forgejo_runner_token }}"
    force: true

- name: Ensure Quadlet directory exists
  ansible.builtin.file:
    path: /etc/containers/systemd
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy Docker-in-Docker Quadlets
  ansible.builtin.template:
    owner: root
    group: root
    mode: "0600"
    dest: "/etc/containers/systemd/{{ item | regex_replace('\\.j2$', '') }}"
    src: "{{ item }}"
  loop:
    - forgejo-runner.network.j2
    - dind-data.volume
    - dind.container.j2
  notify:
    - Reload systemd
    - Restart DinD

- name: Deploy Forgejo Runner Quadlets
  ansible.builtin.template:
    owner: root
    group: root
    mode: "0600"
    dest: "/etc/containers/systemd/{{ item | regex_replace('\\.j2$', '') }}"
    src: "{{ item }}"
  vars:
    # Pass dynamic user IDs to the container and volume templates
    forgejo_runner_user_id: "{{ ansible_facts.getent_passwd['forgejo-runner'][1] }}"
    forgejo_runner_group_id: "{{ ansible_facts.getent_passwd['forgejo-runner'][2] }}"
  loop:
    - forgejo-runner-data.volume
    - runner.container.j2
  notify:
    - Reload systemd
    - Restart Forgejo Runner

- name: Ensure Forgejo Runner service is started
  ansible.builtin.systemd:
    daemon_reload: true
    name: runner.service
    state: started
