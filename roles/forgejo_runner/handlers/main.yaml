---
- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: Restart Tailscale
  ansible.builtin.systemd:
    name: ts-forgejo-runner.service
    state: restarted

- name: Restart DinD
  ansible.builtin.systemd:
    name: dind.service
    state: restarted

- name: Restart Forgejo Runner
  ansible.builtin.systemd:
    name: runner.service
    state: restarted
