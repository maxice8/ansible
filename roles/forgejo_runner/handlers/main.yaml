---
- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: Apply forgejo-runner sysusers
  ansible.builtin.command: systemd-sysusers /etc/sysusers.d/forgejo-runner.conf
  changed_when: true

- name: Apply forgejo-runner tmpfiles
  ansible.builtin.command: systemd-tmpfiles --create /etc/tmpfiles.d/forgejo-runner.conf
  changed_when: true

- name: Restart Tailscale
  ansible.builtin.systemd:
    name: ts-forgejo-runner.service
    state: restarted

- name: Restart DinD
  ansible.builtin.systemd:
    name: dind.service
    state: restarted

- name: Restart Forgejo Runner
  ansible.builtin.systemd:
    name: runner.service
    state: restarted
