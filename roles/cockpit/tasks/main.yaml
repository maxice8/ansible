---
- name: Configure Cockpit Origins and Proxy Headers
  ansible.builtin.copy:
    dest: /etc/cockpit/cockpit.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      [WebService]
      # Allows your Tailscale domain and WebSocket connections
      Origins = https://cockpit.{{ tailnet_name }}.ts.net wss://cockpit.{{ tailnet_name }}.ts.net
      ProtocolHeader = X-Forwarded-Proto
  notify: Restart Cockpit

- name: Ensure cockpit.socket drop-in directory exists
  ansible.builtin.file:
    path: /etc/systemd/system/cockpit.socket.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Restrict Cockpit to listen only on localhost
  ansible.builtin.copy:
    dest: /etc/systemd/system/cockpit.socket.d/listen.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      [Socket]
      # Clear the default listen stream
      ListenStream=
      # Bind exclusively to localhost
      ListenStream=127.0.0.1:9090
  notify:
    - Reload systemd
    - Restart Cockpit

- name: Ensure Cockpit is started and enabled
  ansible.builtin.systemd:
    name: cockpit.socket
    enabled: true
    state: started

- name: Expose Cockpit through Tailscale
  ansible.builtin.command: tailscale serve --service=svc:cockpit --https=443 localhost:9090
  changed_when: false
