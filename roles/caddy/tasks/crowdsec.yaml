---
- name: Create custom CrowdSec config directories
  ansible.builtin.file:
    path: "{{ item }}"
    owner: root
    group: root
    mode: "0755"
    state: directory
  loop:
    - /etc/crowdsec-custom/acquis.d
    - /etc/crowdsec-custom/parsers

- name: Create /etc/crowdsec-custom/acquis.d/caddy.yaml
  ansible.builtin.copy:
    owner: root
    group: root
    mode: "0644"
    content: |
      filenames:
        - /var/log/caddy/*.log
      labels:
        type: caddy
    dest: /etc/crowdsec-custom/acquis.d/caddy.yaml
  notify: Reload Crowdsec

- name: Whitelist Tailscale network in CrowdSec
  ansible.builtin.copy:
    dest: /etc/crowdsec-custom/parsers/ansible-whitelist-tailscale.yaml
    owner: root
    group: root
    mode: "0644"
    content: |
      # This file is auto-generated and will be overwritten by ansible.
      name: ansible-whitelist-tailscale
      description: "Whitelist for Tailscale CGNAT network"
      whitelist:
        reason: "Trusted via Ansible (Tailscale)"
        cidr:
          - "100.64.0.0/10"
  notify: Reload Crowdsec

- name: Whitelist static trusted IPs in CrowdSec
  ansible.builtin.copy:
    dest: /etc/crowdsec-custom/parsers/ansible-whitelist-static.yaml
    owner: root
    group: root
    mode: "0644"
    content: |
      # This file is auto-generated and will be overwritten by ansible.
      name: ansible-whitelist-static
      description: "Whitelist for static trusted IPs defined in Ansible"
      whitelist:
        reason: "Trusted via Ansible (Static)"
        ip:
      {% for ip in crowdsec_trusted_ips %}
          - "{{ ip }}"
      {% endfor %}
  when: crowdsec_trusted_ips | default([]) | length > 0
  notify: Reload Crowdsec

- name: Get current controller public IP
  ansible.builtin.uri:
    url: https://api.ipify.org
    return_content: true
  register: caddy_controller_ip_result
  delegate_to: localhost
  check_mode: false
  changed_when: false

- name: Get current controller hostname
  ansible.builtin.command: hostname
  register: caddy_controller_hostname_result
  delegate_to: localhost
  check_mode: false
  changed_when: false

- name: Whitelist controller IP in CrowdSec (Hostname Versioned)
  ansible.builtin.copy:
    dest: "/etc/crowdsec-custom/parsers/ansible-whitelist-{{ caddy_controller_hostname_result.stdout }}.yaml"
    owner: root
    group: root
    mode: "0644"
    content: |
      # This file is auto-generated and will be overwritten by ansible.
      name: "ansible-whitelist-{{ caddy_controller_hostname_result.stdout }}"
      description: "Whitelist for controller {{ caddy_controller_hostname_result.stdout }}"
      whitelist:
        reason: "Trusted via Ansible ({{ caddy_controller_hostname_result.stdout }})"
        ip:
          - "{{ caddy_controller_ip_result.content }}"
  when:
    - caddy_controller_ip_result.content is defined
  notify: Reload Crowdsec

- name: Deploy CrowdSec Quadlets
  ansible.builtin.template:
    owner: root
    group: root
    mode: "0600"
    dest: "/etc/containers/systemd/{{ item | regex_replace('\\.j2$', '') }}"
    src: "{{ item }}"
  loop:
    - crowdsec-data.volume
    - crowdsec-config.volume
    - crowdsec.container.j2
  notify:
    - Reload systemd
    - Reload Crowdsec

- name: Flush handlers for CrowdSec
  ansible.builtin.meta: flush_handlers

- name: Ensure CrowdSec service is started
  ansible.builtin.systemd:
    name: crowdsec.service
    state: started
    enabled: true
