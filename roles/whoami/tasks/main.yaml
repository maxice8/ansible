---
- name: Ensure Quadlet directory exists
  ansible.builtin.file:
    path: /etc/containers/systemd
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy whoami Quadlet
  ansible.builtin.template:
    src: whoami.container.j2
    dest: /etc/containers/systemd/whoami.container
    owner: root
    group: root
    mode: "0644"
  notify: Restart whoami

- name: Ensure whoami service is enabled and started
  ansible.builtin.systemd:
    daemon_reload: true
    name: whoami.service
    state: started
    enabled: true
