---
- name: Ensure Quadlet directory exists
  ansible.builtin.file:
    path: /etc/containers/systemd
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy whoami Quadlets
  ansible.builtin.template:
    owner: root
    group: root
    mode: "0644"
    dest: "/etc/containers/systemd/{{ item | regex_replace('\\.j2$', '') }}"
    src: "{{ item }}"
  loop:
    - whoami.network.j2
    - whoami.container.j2
  notify: Restart whoami

- name: Ensure whoami service is enabled and started
  ansible.builtin.systemd:
    daemon_reload: true
    name: whoami.service
    state: started
    enabled: true
