---
- name: Fail if borgmatic_ssh_hostname is empty
  delegate_to: localhost
  ansible.builtin.fail:
    msg: The variable 'borgmatic_ssh_hostname' needs to be a non-empty value
  when: borgmatic_ssh_hostname == ""

- name: Fail if borgmatic_ssh_username is empty
  delegate_to: localhost
  ansible.builtin.fail:
    msg: The variable 'borgmatic_ssh_username' needs to be a non-empty value
  when: borgmatic_ssh_username == ""

- name: Fail if borgmatic_ssh_password is empty
  delegate_to: localhost
  ansible.builtin.fail:
    msg: The variable 'borgmatic_ssh_password' needs to be a non-empty value
  when: borgmatic_ssh_password == ""

- name: Ensure Borgmatic SSH directory exists
  ansible.builtin.file:
    path: /etc/borgmatic/ssh
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Generate backup-rsync SSH key
  community.crypto.openssh_keypair:
    path: /etc/borgmatic/ssh/borgbackup
    type: ed25519
    size: 4096
    passphrase: ""
    owner: root
    mode: "0600"
    comment: "root@{{ inventory_hostname }}"

- name: Install SSH key via temporary container
  ansible.builtin.shell:
    executable: /bin/bash
    cmd: |
      set -euo pipefail
      podman run --rm \
        --network host \
        --security-opt label=disable \
        -v /etc/borgmatic/ssh:/mnt/ssh:ro \
        -e SSHPASS="{{ borgmatic_ssh_password }}" \
        docker.io/library/alpine:latest sh -c \
        "apk add --no-cache sshpass openssh-client && \
         cat /mnt/ssh/borgbackup.pub | \
         sshpass -e ssh -o StrictHostKeyChecking=no -o IdentitiesOnly=yes -p 23 \
         '{{ borgmatic_ssh_username }}@{{ borgmatic_ssh_hostname }}' \
         install-ssh-key"
  register: borgmatic_install_key_output
  changed_when: "not 'is already configured' in borgmatic_install_key_output.stdout"

- name: Configure Borgmatic tmpfiles
  ansible.builtin.copy:
    dest: /etc/tmpfiles.d/borgmatic.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      d /etc/borgmatic 0755 root root -
      Z /etc/borgmatic - - - -
  notify: Apply borgmatic tmpfiles

- name: Flush handlers to create Borgmatic directories
  ansible.builtin.meta: flush_handlers

- name: Copy Containerfile to config folder
  ansible.builtin.copy:
    src: Containerfile
    dest: /etc/borgmatic/Containerfile
    owner: root
    group: root
    mode: "0644"
  notify: Rebuild borgmatic container

- name: Install configuration from template
  ansible.builtin.template:
    owner: root
    group: root
    mode: "0600"
    dest: /etc/borgmatic/config.yaml
    src: config.yaml.j2

- name: Ensure Quadlet directory exists
  ansible.builtin.file:
    path: /etc/containers/systemd
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Store Borgmatic Repository Passphrase as a Podman Secret
  containers.podman.podman_secret:
    name: borg_repository_passphrase
    state: present
    data: "{{ borgmatic_repository_passphrase }}"
    force: true

- name: Deploy Borgmatic Quadlets
  ansible.builtin.template:
    owner: root
    group: root
    mode: "0644"
    dest: "/etc/containers/systemd/{{ item | regex_replace('\\.j2$', '') }}"
    src: "{{ item }}"
  loop:
    - borgmatic-cache.volume
    - borgmatic-config.volume
    - borgmatic-state.volume
    - borgmatic.build
    - borgmatic.container.j2
  notify: Reload systemd

- name: Ensure timer is deployed
  ansible.builtin.copy:
    src: borgmatic.timer
    dest: /etc/systemd/system/borgmatic.timer
    owner: root
    group: root
    mode: "0644"
  notify: Restart borgmatic timer

- name: Flush handlers to process removals and builds
  ansible.builtin.meta: flush_handlers

- name: Check if Borg repository is already initialized
  ansible.builtin.command:
    cmd: >
      podman run --rm
      --network host
      --security-opt label=disable
      --secret borg_repository_passphrase,type=env,target=BORG_PASSPHRASE
      -v /etc/borgmatic/config.yaml:/etc/borgmatic/config.yaml:ro,z
      -v /etc/borgmatic/ssh:/root/.ssh:ro,Z
      -v borgmatic-config.volume:/root/.config/borg
      localhost/borgmatic:latest info
  register: borgmatic_repo_check
  changed_when: false
  # We expect this to fail (return non-zero) if the repo doesn't exist yet
  failed_when: false

- name: Initialize Borg repository
  ansible.builtin.command:
    cmd: >
      podman run --rm
      --network host
      --security-opt label=disable
      --secret borg_repository_passphrase,type=env,target=BORG_PASSPHRASE
      -v /etc/borgmatic/config.yaml:/etc/borgmatic/config.yaml:ro,z
      -v /etc/borgmatic/ssh:/root/.ssh:ro,Z
      -v borgmatic-config.volume:/root/.config/borg
      localhost/borgmatic:latest init --encryption repokey
  # Only run the initialization if the 'info' command failed
  when: borgmatic_repo_check.rc != 0
  changed_when: true

- name: Enable borgmatic timer
  ansible.builtin.systemd:
    name: borgmatic.timer
    state: started
    enabled: true
