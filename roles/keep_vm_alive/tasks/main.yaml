---
- name: Create build directory
  ansible.builtin.file:
    path: /etc/keep-vm-alive
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Template keep-vm-alive script to build folder
  ansible.builtin.template:
    src: keep-vm-alive.sh.j2
    dest: /etc/keep-vm-alive/keep-vm-alive.sh
    owner: root
    group: root
    mode: "0755"
  notify: Restart keep-vm-alive-image

- name: Copy Dockerfile to build folder
  ansible.builtin.copy:
    src: Dockerfile
    dest: /etc/keep-vm-alive/Dockerfile
    owner: root
    group: root
    mode: "0644"
  notify: Restart keep-vm-alive-image

- name: Ensure Quadlet directory exists
  ansible.builtin.file:
    path: /etc/containers/systemd
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy keep-vm-alive Quadlets
  ansible.builtin.template:
    src: "{{ item }}"
    dest: "/etc/containers/systemd/{{ item | regex_replace('\\.j2$', '') }}"
    owner: root
    group: root
    mode: "0644"
  loop:
    - keep-vm-alive.build
    - keep-vm-alive.container.j2
  notify:
    - Reload systemd
    - Restart keep-vm-alive

- name: Flush handlers to process removals and builds
  ansible.builtin.meta: flush_handlers

- name: Ensure keep-vm-alive service is enabled and started
  ansible.builtin.systemd:
    name: keep-vm-alive.service
    state: started
    enabled: true
