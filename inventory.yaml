servers:
  vars:
    group_services:
      - restic
    # Change this to the name of the tailscale network
    tailnet_name: neko-great
    # Change this to the name of the domain
    domain_name: maxice8.com
  hosts:
    mika:
      host_services:
        - keep_vm_alive
      # Let's remove group_services for now
      group_services: []
    ryuu:
      # Unlike mika, ryuu is running Fedora CoreOS, so we need to use the core user instead of root
      ansible_user: core
      host_services:
        - caddy
        - oauth2_proxy
        - pocket_id
        - forgejo
        - forgejo_runner
        - whoami
        - syncthing
        - netdata
        - tsidp
        - asf
      # Ports used by the services
      whoami_port: 30001
      forgejo_port: 30002
      forgejo_ssh_port: 30022
      pocket_id_port: 30003
      asf_port: 30004
      backrest_port: 30005
