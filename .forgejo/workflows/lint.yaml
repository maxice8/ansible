name: Pyinfra Lint
on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master", "stable", "release/v*"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      # Forgejo's checkout action (already working properly via data.forgejo.org)
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Explicitly pull Ruff from GitHub
      - name: Lint Python Code (Ruff)
        uses: https://github.com/astral-sh/ruff-action@v3
        with:
          args: "check ."

      # Explicitly pull Ruff from GitHub
      - name: Check Code Formatting (Ruff)
        uses: https://github.com/astral-sh/ruff-action@v3
        with:
          args: "format --check ."