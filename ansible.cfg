[defaults]
# Stop the deprecation warnings and enforce clean namespaces
inject_facts_as_vars = False
# Use the SOPS vars plugin to handle host_vars decryption automatically
vars_plugins_enabled = host_group_vars, community.sops.sops

[community.sops]
# Point the plugin to your local age key file
age_keyfile = .age-key.txt

[ssh_connection]
# -q silences the Fedora CoreOS "Welcome" banners that cause 'junk after JSON'
ssh_args = -C -o ControlMaster=auto -o ControlPersist=60s -q
pipelining = True
